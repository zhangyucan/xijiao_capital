<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>西郊资本记账</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="hero">
        <p class="eyebrow">XIJIAO CAPITAL</p>
        <h1>投资记账台</h1>
        <p class="hero-copy">
          给每位投资人建立独立账户，登录后只看自己的投资记录、当前持仓和余额。
        </p>
        <div class="hero-note">
          <p>已预置两位账户用于快速开始：</p>
          <p>孙钰杰：sun2025</p>
          <p>陈辉：chen2025</p>
          <p>首次登录后可立即修改密码。</p>
        </div>
      </aside>

      <main class="panel">
        <section id="authView" class="view active">
          <div class="card auth-card">
            <div class="tabs">
              <button class="tab active" data-tab="login">账户登录</button>
              <button class="tab" data-tab="register">新建账户</button>
            </div>

            <form id="loginForm" class="form active">
              <label>
                <span>账户名</span>
                <input name="username" placeholder="例如：孙钰杰" required />
              </label>
              <label>
                <span>密码</span>
                <input name="password" type="password" placeholder="请输入密码" required />
              </label>
              <button type="submit" class="primary">登录并查看记录</button>
            </form>

            <form id="registerForm" class="form">
              <label>
                <span>投资人姓名</span>
                <input name="displayName" placeholder="例如：王明" required />
              </label>
              <label>
                <span>登录密码</span>
                <input name="password" type="password" minlength="6" placeholder="至少 6 位" required />
              </label>
              <label>
                <span>初始记录（可选）</span>
                <textarea
                  name="notes"
                  rows="4"
                  placeholder="可填写首笔投资说明、资金来源或备注"
                ></textarea>
              </label>
              <button type="submit" class="primary">创建账户</button>
            </form>

            <p id="authMessage" class="message"></p>
          </div>
        </section>

        <section id="appView" class="view">
          <div class="topbar card">
            <div>
              <p class="eyebrow">当前账户</p>
              <h2 id="welcomeName">-</h2>
            </div>
            <div class="topbar-actions">
              <button id="changePasswordBtn" class="ghost">修改密码</button>
              <button id="logoutBtn" class="ghost">退出登录</button>
            </div>
          </div>

          <div class="grid">
            <section class="card summary-card">
              <h3>账户总览</h3>
              <div class="summary-grid">
                <div>
                  <span>记录笔数</span>
                  <strong id="entryCount">0</strong>
                </div>
                <div>
                  <span>当前持仓</span>
                  <strong id="holdingCount">0</strong>
                </div>
                <div>
                  <span>现金余额</span>
                  <strong id="balanceCount">0</strong>
                </div>
              </div>
            </section>

            <section class="card">
              <h3>新增记录</h3>
              <form id="recordForm" class="form compact">
                <label>
                  <span>日期</span>
                  <input name="date" type="date" required />
                </label>
                <label>
                  <span>操作说明</span>
                  <input name="action" placeholder="例如：买入 100 股 小鹏汽车" required />
                </label>
                <label>
                  <span>价格/金额</span>
                  <input name="detail" placeholder="例如：22.58 USD/股，共计 2258 USD" />
                </label>
                <label>
                  <span>备注</span>
                  <textarea name="note" rows="3" placeholder="补充手续费、汇率、说明"></textarea>
                </label>
                <label>
                  <span>更新后的持仓（每行一条，可选）</span>
                  <textarea
                    name="holdings"
                    rows="4"
                    placeholder="例如：持仓 100股 小鹏汽车(XPEV)"
                  ></textarea>
                </label>
                <label>
                  <span>更新后的余额（每行一条，可选）</span>
                  <textarea
                    name="balances"
                    rows="4"
                    placeholder="例如：余额 USD 679.59 in สามสิบเอ็ด证券"
                  ></textarea>
                </label>
                <button type="submit" class="primary">保存记录</button>
              </form>
            </section>

            <section class="card">
              <h3>修改密码</h3>
              <form id="passwordForm" class="form compact">
                <label>
                  <span>当前密码</span>
                  <input name="currentPassword" type="password" required />
                </label>
                <label>
                  <span>新密码</span>
                  <input name="newPassword" type="password" minlength="6" required />
                </label>
                <button type="submit" class="primary">更新密码</button>
              </form>
            </section>

            <section class="card">
              <h3>当前持仓</h3>
              <div id="holdingsList" class="stack empty-state">暂无持仓</div>
            </section>

            <section class="card">
              <h3>现金余额</h3>
              <div id="balancesList" class="stack empty-state">暂无余额</div>
            </section>

            <section class="card full">
              <div class="section-head">
                <h3>投资流水</h3>
                <button id="exportBtn" class="ghost">导出为文本</button>
              </div>
              <div id="recordsList" class="timeline empty-state">暂无记录</div>
            </section>
          </div>

          <p id="appMessage" class="message"></p>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
